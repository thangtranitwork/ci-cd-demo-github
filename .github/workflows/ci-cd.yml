name: 🚀 Feature Flag CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ─── Job 1: Test ────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    # Self-hosted runner trên máy bạn — Go đã cài sẵn, KHÔNG dùng setup-go
    # (setup-go download ~5 phút mỗi lần vì không persistent cache trên self-hosted)
    runs-on: [ self-hosted, windows ]

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Check Go Version
        run: go version

      - name: Download Dependencies
        run: go mod tidy

      - name: Run Unit Tests
        run: |
          echo "Running unit tests..."
          go test -v -count=1 ./...

  # ─── Job 2: Build & Deploy ──────────────────────────────────────────────────
  deploy:
    name: Build & Deploy
    runs-on: [ self-hosted, windows ]
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Stop Existing Stack
        run: |
          echo "Stopping existing docker compose stack..."
          docker compose down --remove-orphans
        continue-on-error: true

      - name: Build & Start Services
        run: |
          echo "Building and starting all services..."
          docker compose up -d --build

      - name: Wait for App to be Healthy
        run: |
          echo "Waiting for app to be ready..."
          $maxRetries = 15
          $retryCount = 0
          do {
            Start-Sleep -Seconds 3
            $retryCount++
            try {
              $response = Invoke-WebRequest -Uri "http://localhost:8080/health" -UseBasicParsing -TimeoutSec 5
              if ($response.StatusCode -eq 200) {
                echo "App is healthy!"
                exit 0
              }
            } catch {
              echo "Attempt $retryCount/$maxRetries - App not ready yet..."
            }
          } while ($retryCount -lt $maxRetries)
          echo "App failed to become healthy"
          docker compose logs app
          exit 1

      - name: Verify Deployment
        run: |
          echo "Verifying deployment..."
          $health = Invoke-WebRequest -Uri "http://localhost:8080/health" -UseBasicParsing | Select-Object -ExpandProperty Content
          echo "Health: $health"
          $features = Invoke-WebRequest -Uri "http://localhost:8080/admin/features" -UseBasicParsing | Select-Object -ExpandProperty Content
          echo "Features: $features"
          echo "Deployment verified successfully!"

      - name: Cleanup Old Docker Images
        run: |
          echo "Cleaning up dangling images..."
          docker image prune -f
        continue-on-error: true

      - name: Show Running Containers
        run: docker compose ps
